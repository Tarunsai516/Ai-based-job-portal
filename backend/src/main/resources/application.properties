spring.application.name=backend
server.port=8080

# MySQL Workbench / MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/talentsync?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# Set your actual local MySQL password below (e.g. root, 1234, admin, or leave blank if no password):
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Spring JPA Properties for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

